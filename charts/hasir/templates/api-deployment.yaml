apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ include "hasir.api.fullname" . }}'
  labels:
    {{- include "hasir.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "hasir.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "hasir.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: ssh
              containerPort: 2222
              protocol: TCP
          envFrom:
            - configMapRef:
                name: '{{ include "hasir.fullname" . }}-config'
          env:
            - name: HASIR_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: '{{ include "hasir.fullname" . }}-secrets'
                  key: HASIR_POSTGRESQL_PASSWORD
            - name: HASIR_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: '{{ include "hasir.fullname" . }}-secrets'
                  key: HASIR_JWTSECRET
            - name: HASIR_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: '{{ include "hasir.fullname" . }}-secrets'
                  key: HASIR_SMTP_USERNAME
            - name: HASIR_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: '{{ include "hasir.fullname" . }}-secrets'
                  key: HASIR_SMTP_PASSWORD
          volumeMounts:
            - name: ssh-keys
              mountPath: /data/ssh
            - name: repos
              mountPath: /data/repos
            - name: sdk
              mountPath: /data/sdk
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: ssh-keys
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: '{{ include "hasir.api.fullname" . }}-ssh-keys'
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: repos
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: '{{ include "hasir.api.fullname" . }}-repos'
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: sdk
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: '{{ include "hasir.api.fullname" . }}-sdk'
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
