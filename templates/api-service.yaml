apiVersion: v1
kind: Service
metadata:
  name: '{{ include "hasir.api.fullname" . }}'
  labels:
    {{- include "hasir.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hasir.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: '{{ include "hasir.api.fullname" . }}-ssh'
  labels:
    {{- include "hasir.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.ssh.type }}
  ports:
    - port: {{ .Values.api.service.ssh.port }}
      targetPort: ssh
      protocol: TCP
      name: ssh
      {{- if and (eq .Values.api.service.ssh.type "NodePort") .Values.api.service.ssh.nodePort }}
      nodePort: {{ .Values.api.service.ssh.nodePort }}
      {{- end }}
  selector:
    {{- include "hasir.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
